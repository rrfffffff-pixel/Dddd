# Coding Agent Configuration

model:
  provider: ollama
  model: qwen3:1.7b
  base_url: http://localhost:11434
  temperature: 0.1
  max_tokens: 4096

sandbox:
  enabled: true
  engine: subprocess
  timeout: 30

intelligence:
  embedding_model: nomic-embed-text
  index_path: .coding-agent/index
  chunk_size: 512
  chunk_overlap: 50
  max_context_tokens: 12000
